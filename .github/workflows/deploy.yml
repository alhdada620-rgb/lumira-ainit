name: Trigger Cloudflare Pages Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only deploy when the CI workflow (build + /src/index.tsx guard) succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Trigger Cloudflare Pages Deploy Hook
        run: |
          echo "CI passed — triggering Cloudflare Pages deploy..."
          curl -X POST "https://api.cloudflare.com/client/v4/pages/webhooks/deploy_hooks/04148fdf-60fe-428a-b7ea-91356fa4ec1b" \
            -H "Content-Type: application/json" \
            --fail-with-body
          echo "Deploy hook triggered successfully."

  skipped:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion != 'success' }}
    steps:
      - name: Block deploy on failing CI
        run: |
          echo "CI conclusion was '${{ github.event.workflow_run.conclusion }}' — refusing to deploy."
          exit 1
