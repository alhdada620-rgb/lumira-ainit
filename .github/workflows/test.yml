name: Test

on:
  push:
  pull_request:

jobs:
  test:
    name: RTL/LTR Test Suite (Bun ${{ matrix.bun-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Vitest 4.x requires modern runtimes — Bun 1.1.0 ships an older
        # JS engine that fails to load @vitest/coverage-v8. Pin the floor
        # at 1.2.x and keep `latest` as the forward-looking canary.
        bun-version: ['1.2.0', '1.2.21', 'latest']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun ${{ matrix.bun-version }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      # Do NOT use --frozen-lockfile: this repo intentionally keeps the
      # binary bun.lockb out of strict-lock mode (see bunfig.toml) so the
      # matrix can install across multiple Bun versions without lockfile
      # format drift between releases.
      - name: Install dependencies
        run: bun install

      - name: Run RTL/LTR test suite
        run: bun run test

      - name: Run coverage (latest only)
        if: matrix.bun-version == 'latest'
        run: bun run test:coverage
        continue-on-error: true

      - name: Upload coverage report
        if: always() && matrix.bun-version == 'latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-bun-${{ matrix.bun-version }}
          path: coverage/
          retention-days: 30
          if-no-files-found: ignore

      - name: Coverage summary
        if: always() && matrix.bun-version == 'latest'
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "## RTL/LTR Coverage Summary" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat coverage/coverage-summary.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
