name: Test

on:
  push:
  pull_request:

jobs:
  test:
    name: RTL/LTR Test Suite (Bun ${{ matrix.bun-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        bun-version: ['1.1.0', '1.2.0', 'latest']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun ${{ matrix.bun-version }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests with coverage
        run: bun run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-bun-${{ matrix.bun-version }}
          path: coverage/
          retention-days: 30

      - name: Coverage summary
        if: always() && matrix.bun-version == 'latest'
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "## RTL/LTR Coverage Summary" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat coverage/coverage-summary.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
