name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    # Stable job name — use "build" as the required status check in
    # GitHub branch protection for `main`.
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install
#
      #- name: Lint
#        run: bun run lint

      - name: Build (guards against /src/index.tsx in index.html)
        run: bun run build
