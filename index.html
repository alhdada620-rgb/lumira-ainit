<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumira · المراية الذكية للصحة والأناقة</title>
  <meta name="description" content="Lumira - تطبيق المراية الذكية للصحة والأناقة على Pi Network. جرب الملابس افتراضياً، تحليل البشرة، والمساعد الصوتي." />
  <meta property="og:title" content="Lumira · المراية الذكية للصحة والأناقة" />
  <meta property="og:description" content="تجربة المراية الذكية للصحة والأناقة على Pi Network" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Lumira · المراية الذكية للصحة والأناقة" />
  <meta name="twitter:description" content="تجربة المراية الذكية للصحة والأناقة على Pi Network" />
  <style>
    #initial-loader{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:#0b0b12;color:#e8e6f3;font-family:'Tajawal','Inter',system-ui,sans-serif;z-index:9999;transition:opacity .35s ease}
    #initial-loader.hide{opacity:0;pointer-events:none}
    #initial-loader .ring{width:54px;height:54px;border-radius:50%;border:3px solid rgba(255,255,255,.12);border-top-color:#a78bfa;animation:lumira-spin .9s linear infinite}
    #initial-loader .brand{font-size:20px;font-weight:700;letter-spacing:.5px;background:linear-gradient(90deg,#a78bfa,#f0abfc);-webkit-background-clip:text;background-clip:text;color:transparent}
    #initial-loader .hint{font-size:13px;opacity:.6}
    @keyframes lumira-spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div id="initial-loader" aria-hidden="true">
    <div class="ring"></div>
    <div class="brand">Lumira</div>
    <div class="hint">جاري التحميل…</div>
  </div>
  <div id="root"></div>
</body>
</html>
