<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumira · المراية الذكية للصحة والأناقة</title>
</head>
<body>
  <!--
    The HTML shell for production is generated by TanStack Start from
    src/routes/__root.tsx (shellComponent + <Scripts />). All <head> meta,
    the Pi SDK script, and the service-worker registration live there so
    the compiled, hashed module bundle is injected automatically.

    This file is kept minimal because Vite still expects an index.html to
    exist at project root for dev. Do NOT re-add `<script type="module"
    src="/src/index.tsx">` — that is a dev-only path that 404s (and falls
    back to text/html) in production, breaking Pi Browser with
    "Failed to load module script ... MIME type 'text/html'".
  -->
  <div id="root"></div>
</body>
</html>
