[build]
  command = "bun run build && mkdir -p dist/client && cp public/validation-key.txt dist/client/validation-key.txt"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "22"
  BUN_VERSION = "1.3.3"

[[headers]]
  for = "/validation-key.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"